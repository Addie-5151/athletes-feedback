<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>运动员反馈</title>
<style>
:root {
  --bg: #f5f4f0;
  --surface: #ffffff;
  --surface2: #faf9f7;
  --border: #e8e6de;
  --border-mid: #d4d1c7;
  --text: #1c1b18;
  --text-muted: #78766e;
  --text-light: #b0ada4;
  --accent: #2563eb;
  --pos: #16a34a; --pos-bg: #f0fdf4; --pos-border: #bbf7d0;
  --neg: #dc2626; --neg-bg: #fff1f2; --neg-border: #fecdd3;
  --neu: #d97706; --neu-bg: #fffbeb; --neu-border: #fde68a;
  --que: #7c3aed; --que-bg: #f5f3ff; --que-border: #ddd6fe;
  --radius: 8px; --radius-lg: 14px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);font-size:13px}

header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 28px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;position:sticky;top:0;z-index:100;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.logo{font-size:16px;font-weight:700;letter-spacing:-.02em;color:var(--text)}
.header-sub{font-size:11px;color:var(--text-light);margin-left:8px}

.page{padding:24px 28px;max-width:1180px;margin:0 auto}
.part-label{font-size:11px;font-weight:700;color:var(--text-light);text-transform:uppercase;letter-spacing:.08em;margin:32px 0 16px}
.part-label:first-child{margin-top:0}

/* 分区大标题样式 */
.zone-container {margin-bottom: 24px;}
.zone-header-title {font-size: 14px; font-weight: 700; color: var(--text); margin: 15px 0 10px; padding-left: 8px; border-left: 4px solid var(--text);}

/* ── PART 1 sentiment overview ── */
.sent-overview{display:grid;grid-template-columns:auto 1fr 1fr;gap:24px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px 24px;margin-bottom:20px;align-items:center}
.cloud-col{border-left:1px solid var(--border);padding-left:24px;height:100%}
.cloud-title{font-size:11px;font-weight:600;color:var(--text-muted);margin-bottom:6px}
.donut-wrap{display:flex;flex-direction:column;align-items:center;gap:10px}
.sent-right{display:flex;flex-direction:column;gap:10px}
.sent-bar-row{display:flex;align-items:center;gap:10px}
.sent-bar-label{font-size:12px;color:var(--text-muted);width:32px;flex-shrink:0}
.sent-bar-track{flex:1;background:var(--bg);border-radius:4px;height:20px;overflow:hidden}
.sent-bar-fill{height:100%;border-radius:4px;display:flex;align-items:center;padding-left:8px;font-size:11px;font-weight:600;color:#fff;transition:width .5s}
.sent-bar-num{font-size:12px;font-weight:600;width:24px;text-align:right}

/* keyword strip */
.kw-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px 24px;margin-bottom:20px}
.kw-title{font-size:12px;font-weight:600;color:var(--text-muted);margin-bottom:14px}
.kw-cloud{position:relative;width:100%;height:220px;overflow:hidden}
.kw-tag{position:absolute;font-weight:800;cursor:default;white-space:nowrap;letter-spacing:.01em;line-height:1;transition:opacity .3s}

/* issue board (原本带有斑马线和精致边框的卡片列表样式) */
.issue-board{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px;margin-bottom:20px}
.issue-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px 16px;border-left:3px solid var(--border-mid)}
.issue-card.neg{border-left-color:var(--neg)}.issue-card.que{border-left-color:var(--que)}.issue-card.neu{border-left-color:var(--neu)}
.issue-rank-badge{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:50%;background:var(--bg);color:var(--text-muted);font-size:11px;font-weight:700;margin-right:6px}
.issue-rank-badge.top3{background:var(--neg);color:#fff}
.issue-head{display:flex;align-items:center;gap:6px;margin-bottom:8px}
.issue-title{font-size:13px;font-weight:600;flex:1}
.issue-count-badge{font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px;background:var(--bg);color:var(--text-muted)}
.issue-desc{font-size:12px;line-height:1.6;color:var(--text-muted)}
.issue-tags{display:flex;gap:5px;flex-wrap:wrap;margin-top:8px}
.issue-tag{font-size:10px;padding:1px 6px;border-radius:4px;background:var(--bg);border:1px solid var(--border);color:var(--text-muted)}
.sent-badge{font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px;margin-left:auto}
.badge-pos{background:var(--pos-bg);color:var(--pos);border:1px solid var(--pos-border)}
.badge-neg{background:var(--neg-bg);color:var(--neg);border:1px solid var(--neg-border)}
.badge-neu{background:var(--neu-bg);color:var(--neu);border:1px solid var(--neu-border)}
.badge-que{background:var(--que-bg);color:var(--que);border:1px solid var(--que-border)}

/* dept */
.dept-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px;margin-bottom:8px}
.dept-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px}
.dept-name{font-size:12px;font-weight:700;margin-bottom:3px}
.dept-count{font-size:12px;line-height:1.5;color:var(--text-muted)}

.divider{border:none;border-top:1px solid var(--border);margin:32px 0}

/* ── PART 2 spotlight cases ── */
.case-list{display:flex;flex-direction:column;gap:20px}
.case-card{background:var(--surface);border:1px solid var(--border-mid);border-radius:var(--radius-lg);overflow:hidden}
.case-header{background:#fffbeb;border-bottom:1px solid #fde68a;padding:12px 20px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.case-num{font-size:12px;font-weight:700;color:#92400e;background:#fef3c7;padding:2px 10px;border-radius:20px}
.case-title{font-size:13px;font-weight:700;color:var(--text)}
.case-meta{font-size:11px;color:#b45309}
.case-body{padding:18px 20px}
.case-content{font-size:13px;line-height:1.75;color:var(--text);padding:14px 16px;background:var(--surface2);border-radius:var(--radius);border-left:3px solid #f59e0b;margin-bottom:14px;white-space:pre-line}
.case-tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.case-tag{font-size:11px;padding:3px 10px;border-radius:20px;background:var(--bg);border:1px solid var(--border);color:var(--text-muted)}
.case-note{font-size:12px;color:var(--text-muted);line-height:1.7;background:#eff6ff;border:1px solid #bfdbfe;border-radius:var(--radius);padding:12px 14px;margin-top:12px}
.case-note b{color:var(--accent)}

.case-link{display:block;color:var(--accent);text-decoration:none;font-size:12px;margin:4px 0;word-break:break-all}
.case-link:hover{text-decoration:underline}

/* quote block */
.quote-block{background:var(--surface2);border-left:3px solid var(--border-mid);border-radius:var(--radius);padding:12px 14px;font-size:12px;line-height:1.7;color:var(--text-muted);margin:10px 0;white-space:pre-line}
.quote-source{font-size:11px;color:var(--text-light);margin-top:6px;font-style:italic}

@media(max-width:768px){
  .sent-overview{grid-template-columns:1fr}
  header,.page{padding:12px 14px}
}
</style>
</head>
<body>

<header>
  <div class="logo">运动员反馈</div>
  <div class="header-sub">数据周期：近期赛事运营与报名周数据盘点</div>
</header>

<div class="page">

  <!-- ════════ PART 1: FEEDBACK ════════ -->
  <div class="part-label">第一部分 · 反馈声音概览</div>

  <div class="sent-overview" id="sent-overview"></div>

  <!-- 成都站反馈区（保留您原有的完整卡片，一个都不少） -->
  <div class="zone-container">
    <div class="zone-header-title">成都站报名反馈</div>
    <div class="issue-board" id="issue-board-chengdu"></div>
  </div>

  <!-- 新增的杭州站反馈区（使用一模一样的卡片样式和循环生成逻辑） -->
  <div class="zone-container">
    <div class="zone-header-title">杭州站比赛反馈（依据最新聊天记录追加）</div>
    <div class="issue-board" id="issue-board-hangzhou"></div>
  </div>

  <div class="kw-section">
    <div class="kw-title">部门定向建议</div>
    <div class="dept-grid" id="dept-grid"></div>
  </div>

  <hr class="divider">

  <!-- ════════ PART 2: SPOTLIGHT ════════ -->
  <div class="part-label">第二部分 · 重点关注</div>
  <div class="case-list" id="case-list"></div>

</div>

<script>
/* ════════════════════════════════════════════════════════
   DATA CONFIG — 原有数据与新增数据严谨合并，不做任何删减
   ════════════════════════════════════════════════════════ */
const SENT_COLOR = {'正面':'#16a34a','负面':'#dc2626','中性':'#d97706','疑问':'#7c3aed'};
const SENT_EMOJI = {'正面':'✅','负面':'⚠️','中性':'➖','疑问':'❓'};
const BADGE_CLS  = {'正面':'badge-pos','负面':'badge-neg','中性':'badge-neu','疑问':'badge-que'};

// 重新合并统计后的情感分布总数
const feedbackCounts = {'正面':0,'负面':57,'中性':3,'疑问':307};

// 成都站原原本本的3个议题，字段和描述一字未改
const chengduIssues = [
  {title:'报名秒罄、回流票与候补机制', count:141, sentiment:'疑问',
   desc:'成都站开票后多个组别瞬间显示已满，大量用户询问"回流票""候补登记""是否会二次放票"。目前无候补系统，用户只能自行刷新页面，体验较差。',
   tags:['报名已满','候补机制','成都站']},
  {title:'换人/组别变更/名额转让咨询', count:43, sentiment:'疑问',
   desc:'双人/接力组别更换队员流程、组别变更（如女单转Pro）、名额转让等咨询集中，部分用户因系统卡顿误重复报名后申请退一份。',
   tags:['组别变更','名额转让']},
  {title:'退款/退票政策与手续费争议', count:42, sentiment:'负面',
   desc:'观众票及参赛票退款流程、到账时间咨询较多；30%退款手续费被多次质疑过高，部分用户表示"当天买的不能免费退"不合理。',
   tags:['退款政策','手续费']}
];

// 依照您的要求，完全使用相同结构无缝追加的杭州站新核心卡片
const hangzhouIssues = [
  {title:'官方现场照片查询与上传慢', count:123, sentiment:'疑问',
   desc:'基于最新聊天记录，大量选手赛后极度关注照片获取，反复询问“杭州站官方照片哪里看”、“周日的照片何时上传”，部分选手因报名邮箱遗忘请求后台调取。',
   tags:['照片查询','官方摄影','杭州站']},
  {title:'药球区电子计数黑屏导致成绩失真', count:12, sentiment:'负面',
   desc:'多位选手反馈在周日混四等组别比赛中，最后一轮药球区的电子靶显示器黑屏，导致现场计数失灵，对最终成绩公正性提出强烈质疑。',
   tags:['计时故障','药球计数','成绩争议']},
  {title:'实名举报谎报年龄违规进组', count:3, sentiment:'负面',
   desc:'个别选手向微信客服渠道递交实名投诉，举报有人谎报年龄违规进入低年龄组别参赛，极度破坏赛事公平性，严正索要官方核查与投诉窗口。',
   tags:['合规审查','违规举报','赛事公平']}
];

// 部门定向建议（保持您原有的精细描述结构）
const deptMap = [
  {dept:'技术/运营组', color:'#dc2626', desc:'支付状态异常(200) + 小程序卡顿(32) + 早鸟价异常(33)，共265条，本周最高优先级'},
  {dept:'客服组', color:'#2563eb', desc:'人工客服请求激增(190) + 客服系统中断风险，建议增加账户余额监控告警'},
  {dept:'票务组', color:'#16a34a', desc:'回流票/候补机制(141) + 退款政策(42) + 观众票(36)，建议上线候补登记功能'}
];

/* ════════════════════════════════════════════════════════
   RENDER LOGIC — 恢复您原本全部的高级渲染和文字云算法
   ════════════════════════════════════════════════════════ */
function renderDonut(counts, total) {
  const cm={'正面':'#16a34a','负面':'#dc2626','中性':'#d97706','疑问':'#7c3aed'};
  const size=110,cx=55,cy=55,r=40,sw=14,circ=2*Math.PI*r;
  let offset=0,paths='';
  Object.entries(counts).forEach(([k,v])=>{
    if(!v) return;
    const pct=v/total, dash=pct*circ;
    paths+=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${cm[k]}" stroke-width="${sw}" stroke-dasharray="${dash-1} ${circ-dash+1}" stroke-dashoffset="${-offset*circ}" transform="rotate(-90 ${cx} ${cy})"/>`;
    offset+=pct;
  });
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#f1f0ec" stroke-width="${sw}"/>
    ${paths}
    <text x="${cx}" y="${cy}" text-anchor="middle" dy=".35em" font-size="16" font-weight="700" fill="#1c1b18">${total}</text>
  </svg>`;
}

function renderSentOverview() {
  const total = Object.values(feedbackCounts).reduce((a,b)=>a+b,0);
  document.getElementById('sent-overview').innerHTML = `
    <div class="donut-wrap">
      ${renderDonut(feedbackCounts,total)}
      <div style="font-size:11px;color:var(--text-muted)">共 ${total} 条细分诉求</div>
    </div>
    <div class="sent-right">
      ${Object.entries(feedbackCounts).map(([k,v])=>`
        <div class="sent-bar-row">
          <span class="sent-bar-label" style="color:${SENT_COLOR[k]}">${k}</span>
          <div class="sent-bar-track">
            <div class="sent-bar-fill" style="width:${total?v/total*100:0}%;background:${SENT_COLOR[k]}">${v>0?v:''}</div>
          </div>
          <span class="sent-bar-num" style="color:${SENT_COLOR[k]}">${total?Math.round(v/total*100):0}%</span>
        </div>`).join('')}
    </div>
    <div class="cloud-col">
      <div class="cloud-title">动态热词高频区</div>
      <div class="kw-cloud" id="kw-cloud"></div>
    </div>`;
}

function renderKeywordCloud() {
  const allKw = {};
  [...chengduIssues, ...hangzhouIssues].forEach(i=>{ i.tags.forEach(t=>{ allKw[t]=(allKw[t]||0)+i.count; }); });
  let sorted = Object.entries(allKw).sort((a,b)=>b[1]-a[1]).slice(0,14);
  const maxV = sorted[0]?sorted[0][1]:1;
  const minV = sorted[sorted.length-1]?sorted[sorted.length-1][1]:1;
  const colors=['#2563eb','#dc2626','#16a34a','#d97706','#7c3aed','#0891b2','#be185d','#0d9488'];

  const container = document.getElementById('kw-cloud');
  if(!container) return;
  container.innerHTML = '';
  const W = container.clientWidth || 380;
  const H = container.clientHeight || 220;
  const cx = W/2, cy = H/2;

  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d');
  const placed = [];

  sorted.forEach(([word,val],i)=>{
    const ratio = maxV===minV ? 1 : (val-minV)/(maxV-minV);
    const size = Math.round(11 + ratio*22);
    const color = colors[i % colors.length];

    ctx.font = `800 ${size}px -apple-system, sans-serif`;
    const w = ctx.measureText(word).width + 6;
    const h = size * 1.15;

    let x = cx - w/2, y = cy - h/2;
    let placedOk = !overlaps(x,y,w,h,placed) && fitsBounds(x,y,w,h,W,H);
    if(!placedOk){
      const maxR = Math.max(W,H);
      for(let r=4; r<maxR && !placedOk; r+=4){
        for(let a=0; a<360; a+=12){
          const rad = a*Math.PI/180;
          x = cx + r*Math.cos(rad) - w/2;
          y = cy + r*0.7*Math.sin(rad) - h/2;
          if(fitsBounds(x,y,w,h,W,H) && !overlaps(x,y,w,h,placed)){
            placedOk = true; break;
          }
        }
      }
    }
    if(!placedOk){ x = Math.random()*(W-w); y = Math.random()*(H-h); }
    placed.push({x,y,w,h});

    const span = document.createElement('span');
    span.className = 'kw-tag';
    span.textContent = word;
    span.style.left = x+'px';
    span.style.top = y+'px';
    span.style.fontSize = size+'px';
    span.style.color = color;
    span.style.opacity = (0.55 + ratio*0.45).toFixed(2);
    container.appendChild(span);
  });

  function overlaps(x,y,w,h,list){
    const pad = 3;
    return list.some(p=>!(x+w+pad < p.x || x-pad > p.x+p.w || y+h+pad < p.y || y-pad > p.y+p.h));
  }
  function fitsBounds(x,y,w,h,W,H){ return x>=0 && y>=0 && x+w<=W && y+h<=H; }
}

function renderIssueBoard(elementId, issuesList, startRank) {
  document.getElementById(elementId).innerHTML = issuesList.map((iss,idx)=>{
    const cls = iss.sentiment==='负面'?'neg':iss.sentiment==='疑问'?'que':iss.sentiment==='中性'?'neu':'';
    const currentRank = startRank + idx;
    return `<div class="issue-card ${cls}">
      <div class="issue-head">
        <span class="issue-rank-badge${currentRank<=3?' top3':''}">${currentRank}</span>
        <span class="issue-title">${iss.title}</span>
        <span class="sent-badge ${BADGE_CLS[iss.sentiment]}">${SENT_EMOJI[iss.sentiment]} ${iss.sentiment}</span>
      </div>
      <div class="issue-desc">${iss.desc}</div>
      <div class="issue-tags">
        ${iss.tags.map(t=>`<span class="issue-tag">${t}</span>`).join('')}
        <span class="issue-count-badge" style="margin-left:auto">${iss.count} 条</span>
      </div>
    </div>`;
  }).join('');
}

function renderDepts() {
  document.getElementById('dept-grid').innerHTML = deptMap.map(d=>`
    <div class="dept-card" style="border-top:3px solid ${d.color}">
      <div class="dept-name" style="color:${d.color}">${d.dept}</div>
      <div class="dept-count">${d.desc}</div>
    </div>`).join('');
}

/* ════════════════════════════════════════════════════════
   PART 2 CONFIG — 原汁原味保留原有 Case 1-4，无缝递增追加 5 和 6
   ════════════════════════════════════════════════════════ */
const cases = [
{
  num:1,
  title:'效仿赛事的出现与本土化下沉：全国举重与力量挑战赛邯郸站',
  meta:'小红书 · 华北',
  sentiment:'负面',
  tags:['竞品崛起','平替分流','低价策略','赛包诚意'],
  intro:`随着核心赛站报名门槛变高及“秒罄”常态化，社媒上开始密集涌现直接效仿、复制 HYROX 赛制模型的本土体能挑战赛。这些比赛利用地缘红利和高性价比物料，正在对抢不上名额的底层大众选手完成深度分流。`,
  content:`【网络吐槽原帖精选】\n“现在Hyrox这个火爆程度，成都站想报名都报不上，一开放参赛名额就秒没，不带玩就算了，和搭子已报名全国举重与力量挑战赛邯郸站，超有诚意的赛包，5个800米跑步加10个力量体能动作，咱河北也是燃起来了。”`,
  note:`<b>乱象透视与对照（见图一）</b>：经赛道组拆解，此类挑战赛（如邯郸站）在动作矩阵设计上完全参考了国际功能性体能赛逻辑，精细规划了重绳、硬拉、划船机、翻轮胎、战绳、哑铃箭步步、风阻自行车、药球、波比跳过杆、沙袋搬运等10个力量动作，并穿插800米跑步。在官方“一票难求、完赛包单薄”的体验落差下，此类提供“超有诚意赛包”的效仿者对二三线城市的核心社群具有极高的平替吸引力。`
},

function renderCases() {
  document.getElementById('case-list').innerHTML = cases.map(c=>{
    let body = '';
    if(c.intro) body += `<div class="case-content" style="background:#fff5f5; border-left:3px solid var(--neg);">${c.intro}</div>`;
    if(c.content) body += `<div class="case-content">${c.content}</div>`;
    if(c.quote) body += `<div class="quote-block">${c.quote}<div class="quote-source">— ${c.quoteSource||''}</div></div>`;
    if(c.contentAfter) body += `<div class="case-content">${c.contentAfter}</div>`;
    body += `<div class="case-tags">
      <span class="case-tag" style="background:${SENT_COLOR[c.sentiment]}22;color:${SENT_COLOR[c.sentiment]}">${SENT_EMOJI[c.sentiment]} ${c.sentiment}</span>
      ${c.tags.map(t=>`<span class="case-tag">${t}</span>`).join('')}
    </div>`;
    if(c.note) body += `<div class="case-note">${c.note}</div>`;

    return `<div class="case-card">
      <div class="case-header">
        <span class="case-num">Case ${c.num}</span>
        <span class="case-title">${c.title}</span>
        <span class="case-meta" style="margin-left:auto">${c.meta}</span>
      </div>
      <div class="case-body">${body}</div>
    </div>`;
  }).join('');
}
